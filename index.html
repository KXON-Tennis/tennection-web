<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennection · 記錄每一球，連結每一場</title>
  <meta name="description" content="Tennection 是專為網球玩家打造的練習日記與專家諮詢 App。記錄練習、找球友、與專業團隊建立長期合作。" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta property="og:title" content="Tennection" />
  <meta property="og:description" content="口袋裡的專業團隊：網球教練、體能訓練師、物理治療師、運動營養師、運動心理師。" />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="/" style="display: flex; align-items: center; gap: 12px; color: inherit; text-decoration: none;">
      <img src="/logo.png" alt="Tennection" class="brand-logo" />
      <span class="brand">TENNECTION</span>
    </a>
  </header>

  <main class="hero">
    <!-- Decorative tennis-court lines, very subtle so the eye reads them as
         a backdrop pattern, not a foreground graphic. -->
    <svg class="court-bg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <g stroke="rgba(255,255,255,0.05)" stroke-width="1.4" fill="none">
        <!-- outer doubles -->
        <rect x="40" y="40" width="720" height="400" />
        <!-- singles sidelines -->
        <line x1="100" y1="40" x2="100" y2="440" />
        <line x1="700" y1="40" x2="700" y2="440" />
        <!-- service line + center -->
        <line x1="40" y1="240" x2="760" y2="240" />
        <line x1="100" y1="160" x2="700" y2="160" />
        <line x1="100" y1="320" x2="700" y2="320" />
        <line x1="400" y1="160" x2="400" y2="320" />
      </g>
    </svg>

    <span class="tag">COMING SOON</span>
    <h1>記錄每一球，<br />連結每一場</h1>
    <div class="accent-line"></div>
    <p class="lead">
      口袋裡的專業團隊：網球教練、體能訓練師、物理治療師、運動營養師、運動心理師。每次諮詢都是獨立案件，附上專屬處方箋。
    </p>

    <!-- Phone mockup showing the in-app team-hero element. -->
    <div class="device">
      <svg viewBox="0 0 280 540" xmlns="http://www.w3.org/2000/svg" aria-label="Tennection app preview">
        <defs>
          <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="rgba(212,255,0,0.18)" />
            <stop offset="100%" stop-color="rgba(212,255,0,0.04)" />
          </linearGradient>
        </defs>

        <!-- phone frame -->
        <rect x="0" y="0" width="280" height="540" rx="40" fill="#1a1f26" stroke="#2a2f36" stroke-width="2" />
        <!-- screen -->
        <rect x="10" y="10" width="260" height="520" rx="32" fill="#0f1419" />
        <!-- notch -->
        <rect x="110" y="20" width="60" height="14" rx="7" fill="#1a1f26" />

        <!-- header brand -->
        <text x="140" y="70" text-anchor="middle" fill="#d4ff00" font-size="11" font-weight="800" letter-spacing="2" font-family="-apple-system, sans-serif">TENNECTION</text>

        <!-- greeting line -->
        <text x="28" y="112" fill="#fff" font-size="13" font-weight="800" font-family="-apple-system, sans-serif">嗨，Kayson</text>

        <!-- team hero card -->
        <rect x="22" y="130" width="236" height="148" rx="16" fill="url(#heroGrad)" stroke="rgba(212,255,0,0.35)" stroke-width="1" />

        <!-- overlapping ringed avatars (matching app's muted palette) -->
        <g transform="translate(40, 158)">
          <circle cx="22" cy="22" r="22" fill="#0f1419" />
          <circle cx="22" cy="22" r="22" fill="none" stroke="#C2D680" stroke-width="2" />
          <text x="22" y="27" text-anchor="middle" fill="#C2D680" font-size="14" font-weight="700">C</text>

          <circle cx="60" cy="22" r="22" fill="#0f1419" />
          <circle cx="60" cy="22" r="22" fill="none" stroke="#E1A485" stroke-width="2" />
          <text x="60" y="27" text-anchor="middle" fill="#E1A485" font-size="14" font-weight="700">王</text>

          <circle cx="98" cy="22" r="22" fill="#0f1419" />
          <circle cx="98" cy="22" r="22" fill="none" stroke="#9DBBD0" stroke-width="2" />
          <text x="98" y="27" text-anchor="middle" fill="#9DBBD0" font-size="14" font-weight="700">林</text>

          <circle cx="136" cy="22" r="22" fill="#0f1419" />
          <circle cx="136" cy="22" r="22" fill="none" stroke="#D6BD8A" stroke-width="2" />
          <text x="136" y="27" text-anchor="middle" fill="#D6BD8A" font-size="14" font-weight="700">陳</text>
        </g>

        <text x="40" y="232" fill="#fff" font-size="13" font-weight="800" font-family="-apple-system, sans-serif">您的專業團隊已就位</text>
        <text x="40" y="252" fill="#a0a6b0" font-size="10" font-family="-apple-system, sans-serif">與 Carl、王教練、林教練 一起打造你的極限</text>

        <!-- list items -->
        <text x="22" y="312" fill="#a0a6b0" font-size="11" font-weight="700" font-family="-apple-system, sans-serif">進行中</text>
        <rect x="22" y="324" width="236" height="64" rx="12" fill="#1a1f26" />
        <circle cx="38" cy="356" r="4" fill="#d4ff00" />
        <text x="50" y="350" fill="#fff" font-size="11" font-weight="700" font-family="-apple-system, sans-serif">反手切球角度問題</text>
        <text x="50" y="366" fill="#a0a6b0" font-size="9" font-family="-apple-system, sans-serif">Carl 教練 ・ 等你追問</text>

        <text x="22" y="416" fill="#a0a6b0" font-size="11" font-weight="700" font-family="-apple-system, sans-serif">新諮詢</text>
        <rect x="22" y="428" width="112" height="68" rx="14" fill="rgba(194,214,128,0.08)" stroke="rgba(194,214,128,0.45)" stroke-width="1" />
        <text x="34" y="476" fill="#fff" font-size="11" font-weight="800" font-family="-apple-system, sans-serif">網球技術</text>
        <text x="34" y="488" fill="rgba(194,214,128,0.95)" font-size="8" font-family="-apple-system, sans-serif">抽球・發球・步法</text>

        <rect x="146" y="428" width="112" height="68" rx="14" fill="rgba(225,164,133,0.08)" stroke="rgba(225,164,133,0.45)" stroke-width="1" />
        <text x="158" y="476" fill="#fff" font-size="11" font-weight="800" font-family="-apple-system, sans-serif">體能訓練</text>
        <text x="158" y="488" fill="rgba(225,164,133,0.95)" font-size="8" font-family="-apple-system, sans-serif">肌力・爆發力・核心</text>
      </svg>
    </div>
  </main>

  <footer>
    <a href="/privacy">隱私權政策</a>·
    <a href="/terms">服務條款</a>·
    <a href="mailto:kaysoncho@gmail.com">聯絡我們</a>
    <div style="margin-top: 12px;">© 2026 Tennection · KXON</div>
  </footer>
</body>
</html>
